syntax = "proto3";

option csharp_namespace = "Harness.Abstractions.Actr.Services";

package actr.services;

import "common.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

service DeclarativeMemory {
  rpc AddChunk(AddChunkRequest) returns (google.protobuf.Empty);
  rpc Retrieve(RetrieveRequest) returns (RetrieveResponse);
  rpc TickMemory(TickMemoryRequest) returns (google.protobuf.Empty);
}

message AddChunkRequest {
  MemoryChunk chunk = 1;
}

message RetrieveRequest {
  map<string, string> cue = 1;
}

message RetrieveResponse {
  optional MemoryChunk chunk = 1;
}

message TickMemoryRequest {
  double delta_time = 1;
  google.protobuf.Struct buffer_snapshots = 2;
}